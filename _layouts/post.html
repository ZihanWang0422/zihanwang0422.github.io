---
layout: page
hide_title: true
hide_description: true
---

<article class="post">
  <h1 class="post-title">{{ page.title }}</h1>
  <div class="post-date">
    <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y-%m-%d" }}</time>
    {% if page.tags.size > 0 %}
    <span class="post-tags">
      {% for tag in page.tags %}
      <a href="{{ site.baseurl }}/tags/#{{ tag | slugify }}" class="post-tag">{{ tag }}</a>
      {% endfor %}
    </span>
    {% endif %}
  </div>

  {% if page.description %}
  <div class="post-description">
    {{ page.description }}
  </div>
  {% endif %}

  <div class="post-content-wrapper">
    <div class="post-content">
      {{ content }}
    </div>
  </div>
</article>

<style>
  .post-title {
    margin-bottom: 0.5rem;
    font-size: 2rem;
  }
  
  .post-date {
    margin-bottom: 1.5rem;
    color: #767676;
  }
  
  .post-tags {
    margin-left: 1rem;
  }
  
  .post-tag {
    display: inline-block;
    padding: 0.2rem 0.5rem;
    margin-right: 0.5rem;
    background-color: #f1f1f1;
    border-radius: 3px;
    font-size: 0.8rem;
    text-decoration: none;
  }
  
  .post-description {
    font-style: italic;
    margin-bottom: 2rem;
    color: #555;
    font-size: 1.1rem;
  }
  
  .post-content {
    margin-top: 2rem;
  }
  
  .post-content h2:first-child {
    display: none;
  }
  
  /* 隐藏重复的标题和描述 */
  .page-title, .description {
    display: none !important;
  }
  
  /* 内容包装器，确保足够宽以容纳侧边目录 */
  .post-content-wrapper {
    width: 100%;
    position: relative;
  }
</style>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    // 创建一个固定在右侧的目录副本
    const toc = document.getElementById('markdown-toc');
    if (toc) {
      // 获取所有标题元素
      const headings = document.querySelectorAll('.post-content h1, .post-content h2, .post-content h3');
      const tocLinks = toc.querySelectorAll('a');
      
      // 滚动时更新活跃目录项
      window.addEventListener('scroll', function() {
        // 获取当前滚动位置
        const scrollPosition = window.scrollY;
        
        // 找到当前可见的标题
        let currentHeading = null;
        for (let i = 0; i < headings.length; i++) {
          const heading = headings[i];
          const topOffset = heading.offsetTop - 120; // 考虑固定头部高度
          
          if (scrollPosition >= topOffset) {
            currentHeading = heading;
          } else {
            break;
          }
        }
        
        // 移除所有活跃类
        tocLinks.forEach(function(link) {
          link.classList.remove('active');
        });
        
        // 如果找到当前标题，高亮对应的目录项
        if (currentHeading) {
          const id = currentHeading.id;
          const activeLink = toc.querySelector('a[href="#' + id + '"]');
          if (activeLink) {
            activeLink.classList.add('active');
          }
        }
      });
      
      // 初始触发一次滚动事件
      window.dispatchEvent(new Event('scroll'));
    }
  });
</script>
